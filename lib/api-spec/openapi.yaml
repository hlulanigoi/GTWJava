openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Going That Way — Admin Dashboard API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Logged out

  # ── Admin Stats ────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Platform-wide statistics
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # ── Admin Users ────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List users (paginated)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: search
          in: query
          schema: { type: string }
        - name: role
          in: query
          schema: { type: string, enum: [USER, ADMIN] }
      responses:
        "200":
          description: Paginated users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"

  /admin/users/{id}/activate:
    patch:
      operationId: activateUser
      tags: [admin]
      summary: Activate user
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/deactivate:
    patch:
      operationId: deactivateUser
      tags: [admin]
      summary: Deactivate user
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [admin]
      summary: Update user role
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Admin Drivers ──────────────────────────────────────────────────────────
  /admin/drivers/pending:
    get:
      operationId: listPendingDrivers
      tags: [admin]
      summary: List pending driver applications
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Pending drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/drivers/{id}/approve:
    patch:
      operationId: approveDriver
      tags: [admin]
      summary: Approve driver application
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/drivers/{id}/reject:
    patch:
      operationId: rejectDriver
      tags: [admin]
      summary: Reject driver application
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Admin Rides ────────────────────────────────────────────────────────────
  /admin/rides:
    get:
      operationId: listAdminRides
      tags: [admin]
      summary: List rides (paginated)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated rides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RidePage"

  /admin/rides/{id}/status:
    patch:
      operationId: updateRideStatus
      tags: [admin]
      summary: Update ride status
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RideStatusUpdate"
      responses:
        "200":
          description: Updated ride
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"

  # ── Admin Trips ────────────────────────────────────────────────────────────
  /admin/trips:
    get:
      operationId: listAdminTrips
      tags: [admin]
      summary: List trips (paginated)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated trips
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripPage"

  # ── Admin Tickets ──────────────────────────────────────────────────────────
  /admin/tickets:
    get:
      operationId: listAdminTickets
      tags: [admin]
      summary: List tickets
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  /admin/tickets/price:
    patch:
      operationId: updateTicketPrice
      tags: [admin]
      summary: Update global ticket price
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketPriceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketPriceResult"

  # ── Admin Payments ─────────────────────────────────────────────────────────
  /admin/payments/pending:
    get:
      operationId: listPendingPayments
      tags: [admin]
      summary: List pending payments
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Pending payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /admin/payments/{ref}/verify:
    patch:
      operationId: verifyPayment
      tags: [admin]
      summary: Verify a payment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: ref
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Verified payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /admin/payments/{ref}/reject:
    patch:
      operationId: rejectPayment
      tags: [admin]
      summary: Reject a payment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: ref
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRejection"
      responses:
        "200":
          description: Rejected payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ── Admin Revenue Report ───────────────────────────────────────────────────
  /admin/reports/revenue:
    get:
      operationId: getRevenueReport
      tags: [admin]
      summary: Revenue analytics
      security: [{ bearerAuth: [] }]
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [week, month, year], default: week }
      responses:
        "200":
          description: Revenue report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueReport"

# ── Components ────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    User:
      type: object
      required: [id, fullName, email, role, isActive, isApprovedDriver]
      properties:
        id:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [USER, ADMIN]
        rating:
          type: string
        totalRidesDriven:
          type: integer
        totalRidesTaken:
          type: integer
        ticketsOwned:
          type: integer
        isActive:
          type: boolean
        isApprovedDriver:
          type: boolean
        licenseNumber:
          type: ["string", "null"]
        vehiclePlate:
          type: ["string", "null"]
        createdAt:
          type: string

    UserPage:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    RoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [USER, ADMIN]

    AdminStats:
      type: object
      required: [totalUsers, activeUsers, totalRides, activeTrips, pendingPayments, totalRevenue, revenueThisWeek, revenueThisMonth]
      properties:
        totalUsers:
          type: integer
        activeUsers:
          type: integer
        totalRides:
          type: integer
        activeTrips:
          type: integer
        pendingPayments:
          type: integer
        totalRevenue:
          type: number
        revenueThisWeek:
          type: number
        revenueThisMonth:
          type: number
        pendingDriverApplications:
          type: integer

    Ride:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        passengerId:
          type: string
        driverId:
          type: ["string", "null"]
        originLat:
          type: number
        originLng:
          type: number
        originAddress:
          type: string
        destLat:
          type: number
        destLng:
          type: number
        destAddress:
          type: string
        status:
          type: string
        fare:
          type: ["string", "null"]
        paymentReference:
          type: ["string", "null"]
        scheduledAt:
          type: ["string", "null"]
        createdAt:
          type: string

    RidePage:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Ride"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    RideStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string

    Trip:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        carrierId:
          type: string
        originAddress:
          type: string
        destAddress:
          type: string
        departureTime:
          type: string
        transportMode:
          type: string
        capacity:
          type: integer
        status:
          type: string
        createdAt:
          type: string

    TripPage:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/Trip"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    Ticket:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        userId:
          type: string
        code:
          type: string
        pricePaid:
          type: string
        paymentReference:
          type: string
        status:
          type: string
        expiresAt:
          type: ["string", "null"]
        createdAt:
          type: string

    TicketPriceUpdate:
      type: object
      required: [price]
      properties:
        price:
          type: number

    TicketPriceResult:
      type: object
      required: [price]
      properties:
        price:
          type: number

    Payment:
      type: object
      required: [id, reference, amount, type, status]
      properties:
        id:
          type: string
        userId:
          type: string
        verifiedBy:
          type: ["string", "null"]
        reference:
          type: string
        amount:
          type: string
        type:
          type: string
          enum: [RIDE, TICKET]
        status:
          type: string
          enum: [PENDING, VERIFIED, REJECTED]
        createdAt:
          type: string

    PaymentRejection:
      type: object
      properties:
        reason:
          type: string

    RevenueReport:
      type: object
      required: [period, buckets, total]
      properties:
        period:
          type: string
        total:
          type: number
        buckets:
          type: array
          items:
            $ref: "#/components/schemas/RevenueBucket"

    RevenueBucket:
      type: object
      required: [label, amount]
      properties:
        label:
          type: string
        amount:
          type: number
