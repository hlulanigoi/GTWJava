openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Going That Way — API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: parcels
    description: Parcel operations
  - name: rides
    description: Ride operations
  - name: matches
    description: Match operations
  - name: tickets
    description: Ticket operations
  - name: payments
    description: Payment operations
  - name: users
    description: User operations
  - name: admin
    description: Admin operations

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "409":
          description: Email already exists

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResult"
        "401":
          description: Invalid credentials

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthenticated

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Logged out

  # ── Parcels ────────────────────────────────────────────────────────────────
  /parcels/my:
    get:
      operationId: getMyParcels
      tags: [parcels]
      summary: List my parcels
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My parcels
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Parcel"

  /parcels:
    get:
      operationId: listParcels
      tags: [parcels]
      summary: List available parcels (for carriers)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: status
          in: query
          schema: { type: string }
        - name: lat
          in: query
          schema: { type: number }
        - name: lng
          in: query
          schema: { type: number }
        - name: radius_km
          in: query
          schema: { type: number }
      responses:
        "200":
          description: Paginated parcels
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParcelPage"

    post:
      operationId: createParcel
      tags: [parcels]
      summary: Create a new parcel
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParcelInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parcel"

  /parcels/{id}:
    get:
      operationId: getParcel
      tags: [parcels]
      summary: Get parcel by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Parcel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parcel"
        "404":
          description: Not found

    delete:
      operationId: deleteParcel
      tags: [parcels]
      summary: Cancel / delete a pending parcel
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted

  /parcels/{id}/status:
    patch:
      operationId: updateParcelStatus
      tags: [parcels]
      summary: Update parcel status
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParcelStatusUpdate"
      responses:
        "200":
          description: Updated parcel
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Parcel"

  # ── Rides ──────────────────────────────────────────────────────────────────
  /rides/my:
    get:
      operationId: getMyRides
      tags: [rides]
      summary: List my rides
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My rides
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ride"

  /rides:
    get:
      operationId: listRides
      tags: [rides]
      summary: List rides
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated rides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RidePage"

    post:
      operationId: createRide
      tags: [rides]
      summary: Create a new ride request
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RideInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"

  /rides/{id}:
    get:
      operationId: getRide
      tags: [rides]
      summary: Get ride by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Ride
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"
        "404":
          description: Not found

    delete:
      operationId: deleteRide
      tags: [rides]
      summary: Cancel / delete a pending ride
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Deleted

  /rides/{id}/status:
    patch:
      operationId: updateRideStatus
      tags: [rides]
      summary: Update ride status
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RideStatusUpdate"
      responses:
        "200":
          description: Updated ride
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"

  /rides/on-demand:
    post:
      operationId: createOnDemandRide
      tags: [rides]
      summary: Create an on-demand ride using GPS coords for pickup
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnDemandRideInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnDemandRideResult"

  # ── Matches ────────────────────────────────────────────────────────────────
  /matches:
    get:
      operationId: getMyMatches
      tags: [matches]
      summary: List matches for the current user (as sender or carrier)
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Matches
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Match"

  /matches/{id}/accept:
    post:
      operationId: acceptMatch
      tags: [matches]
      summary: Accept a match
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Accepted match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  /matches/{id}/reject:
    post:
      operationId: rejectMatch
      tags: [matches]
      summary: Reject a match
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Rejected match
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Match"

  # ── Tickets ────────────────────────────────────────────────────────────────
  /tickets/my:
    get:
      operationId: getMyTickets
      tags: [tickets]
      summary: List my tickets
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: My tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  /tickets/price:
    get:
      operationId: getTicketPrice
      tags: [tickets]
      summary: Get the current ticket price
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Ticket price
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketPriceResult"

  /tickets/purchase:
    post:
      operationId: purchaseTicket
      tags: [tickets]
      summary: Purchase a carrier ticket
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketPurchaseInput"
      responses:
        "201":
          description: Purchased ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"

  # ── Payments ───────────────────────────────────────────────────────────────
  /payments/initiate:
    post:
      operationId: initiatePayment
      tags: [payments]
      summary: Initiate a bank transfer payment and get a reference number
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentInitiateInput"
      responses:
        "201":
          description: Payment initiated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaymentInitiateResult"

  /payments/verify:
    post:
      operationId: verifyPaymentStatus
      tags: [payments]
      summary: Check the status of a payment reference
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentVerifyInput"
      responses:
        "200":
          description: Payment status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ── Users ──────────────────────────────────────────────────────────────────
  /users/{id}:
    get:
      operationId: getUser
      tags: [users]
      summary: Get a user by ID
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/profile:
    patch:
      operationId: updateProfile
      tags: [users]
      summary: Update my profile
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /users/me/apply-driver:
    post:
      operationId: applyAsDriver
      tags: [users]
      summary: Apply to become a driver/carrier
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DriverApplicationInput"
      responses:
        "200":
          description: Application submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Admin Stats ────────────────────────────────────────────────────────────
  /admin/stats:
    get:
      operationId: getAdminStats
      tags: [admin]
      summary: Platform-wide statistics
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminStats"

  # ── Admin Users ────────────────────────────────────────────────────────────
  /admin/users:
    get:
      operationId: listAdminUsers
      tags: [admin]
      summary: List users (paginated)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: search
          in: query
          schema: { type: string }
        - name: role
          in: query
          schema: { type: string, enum: [USER, ADMIN] }
      responses:
        "200":
          description: Paginated users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"

  /admin/users/{id}/activate:
    patch:
      operationId: activateUser
      tags: [admin]
      summary: Activate user
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/deactivate:
    patch:
      operationId: deactivateUser
      tags: [admin]
      summary: Deactivate user
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/users/{id}/role:
    patch:
      operationId: updateUserRole
      tags: [admin]
      summary: Update user role
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RoleUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Admin Drivers ──────────────────────────────────────────────────────────
  /admin/drivers/pending:
    get:
      operationId: listPendingDrivers
      tags: [admin]
      summary: List pending driver applications
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Pending drivers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/User"

  /admin/drivers/{id}/approve:
    patch:
      operationId: approveDriver
      tags: [admin]
      summary: Approve driver application
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  /admin/drivers/{id}/reject:
    patch:
      operationId: rejectDriver
      tags: [admin]
      summary: Reject driver application
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"

  # ── Admin Rides ────────────────────────────────────────────────────────────
  /admin/rides:
    get:
      operationId: listAdminRides
      tags: [admin]
      summary: List rides (paginated)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated rides
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RidePage"

  /admin/rides/{id}/status:
    patch:
      operationId: updateAdminRideStatus
      tags: [admin]
      summary: Update ride status (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RideStatusUpdate"
      responses:
        "200":
          description: Updated ride
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ride"

  # ── Admin Trips ────────────────────────────────────────────────────────────
  /admin/trips:
    get:
      operationId: listAdminTrips
      tags: [admin]
      summary: List trips (paginated)
      security: [{ bearerAuth: [] }]
      parameters:
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Paginated trips
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TripPage"

  # ── Admin Tickets ──────────────────────────────────────────────────────────
  /admin/tickets:
    get:
      operationId: listAdminTickets
      tags: [admin]
      summary: List tickets
      security: [{ bearerAuth: [] }]
      parameters:
        - name: status
          in: query
          schema: { type: string }
      responses:
        "200":
          description: Tickets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Ticket"

  /admin/tickets/price:
    patch:
      operationId: updateTicketPrice
      tags: [admin]
      summary: Update global ticket price
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketPriceUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TicketPriceResult"

  # ── Admin Payments ─────────────────────────────────────────────────────────
  /admin/payments/pending:
    get:
      operationId: listPendingPayments
      tags: [admin]
      summary: List pending payments
      security: [{ bearerAuth: [] }]
      responses:
        "200":
          description: Pending payments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Payment"

  /admin/payments/{ref}/verify:
    patch:
      operationId: verifyPayment
      tags: [admin]
      summary: Verify a payment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: ref
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Verified payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  /admin/payments/{ref}/reject:
    patch:
      operationId: rejectPayment
      tags: [admin]
      summary: Reject a payment
      security: [{ bearerAuth: [] }]
      parameters:
        - name: ref
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PaymentRejection"
      responses:
        "200":
          description: Rejected payment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Payment"

  # ── Admin Revenue Report ───────────────────────────────────────────────────
  /admin/reports/revenue:
    get:
      operationId: getRevenueReport
      tags: [admin]
      summary: Revenue analytics
      security: [{ bearerAuth: [] }]
      parameters:
        - name: period
          in: query
          schema: { type: string, enum: [week, month, year], default: week }
      responses:
        "200":
          description: Revenue report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RevenueReport"

# ── Components ────────────────────────────────────────────────────────────────
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    # ── Auth ──────────────────────────────────────────────────────────────
    RegisterInput:
      type: object
      required: [full_name, email, password]
      properties:
        full_name:
          type: string
        email:
          type: string
        password:
          type: string
        phone:
          type: string

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResult:
      type: object
      required: [token, user]
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"

    # ── Users ─────────────────────────────────────────────────────────────
    User:
      type: object
      required: [id, fullName, email, role, isActive, isApprovedDriver]
      properties:
        id:
          type: string
        fullName:
          type: string
        email:
          type: string
        phone:
          type: ["string", "null"]
        role:
          type: string
          enum: [USER, ADMIN]
        rating:
          type: string
        totalRidesDriven:
          type: integer
        totalRidesTaken:
          type: integer
        ticketsOwned:
          type: integer
        isActive:
          type: boolean
        isApprovedDriver:
          type: boolean
        licenseNumber:
          type: ["string", "null"]
        vehiclePlate:
          type: ["string", "null"]
        createdAt:
          type: string

    UserPage:
      type: object
      required: [data, total, page, pageSize]
      properties:
        data:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        page:
          type: integer
        pageSize:
          type: integer

    ProfileUpdate:
      type: object
      properties:
        full_name:
          type: string
        phone:
          type: string

    DriverApplicationInput:
      type: object
      required: [license_number, vehicle_plate, vehicle_model]
      properties:
        license_number:
          type: string
        vehicle_plate:
          type: string
        vehicle_model:
          type: string

    RoleUpdate:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [USER, ADMIN]

    # ── Parcels ───────────────────────────────────────────────────────────
    Parcel:
      type: object
      required: [id, status]
      properties:
        id:
          type: string
        senderId:
          type: string
        carrierId:
          type: ["string", "null"]
        description:
          type: string
        weight:
          type: string
        size:
          type: string
          enum: [SMALL, MEDIUM, LARGE]
        pickupAddress:
          type: string
        pickupLat:
          type: string
        pickupLng:
          type: string
        destinationAddress:
          type: string
        destinationLat:
          type: string
        destinationLng:
          type: string
        fee:
          type: string
        platformFee:
          type: string
        carrierEarning:
